<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loan EMI Calculator | Smile Financial Solution</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-md mx-auto bg-white p-8 rounded-3xl shadow-xl border border-gray-100 mt-10">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-700">Business Loan Calculator</h2>
        <div class="space-y-4">
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase">Loan Amount (₹)</label>
                <input type="number" id="amount" value="500000" class="w-full p-3 bg-gray-100 rounded-xl outline-none border-none mt-1">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase">Interest Rate (%)</label>
                <input type="number" id="rate" value="9" class="w-full p-3 bg-gray-100 rounded-xl outline-none border-none mt-1">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase">Tenure (Years)</label>
                <input type="number" id="years" value="5" class="w-full p-3 bg-gray-100 rounded-xl outline-none border-none mt-1">
            </div>
            <button onclick="calculateEMI()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold shadow-lg shadow-blue-200">Calculate EMI</button>
            <div id="result" class="mt-6 text-center text-xl font-bold text-slate-800"></div>
        </div>
    </div>

    <script>
        function calculateEMI() {
            let p = document.getElementById('amount').value;
            let r = document.getElementById('rate').value / 12 / 100;
            let n = document.getElementById('years').value * 12;
            let emi = (p * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
            document.getElementById('result').innerHTML = "Monthly EMI: ₹" + Math.round(emi).toLocaleString();
        }
    </script>
</body>
</html>
