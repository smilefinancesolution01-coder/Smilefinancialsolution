<div id="ai-chat-window" class="fixed bottom-28 right-10 bg-white shadow-2xl rounded-[2.5rem] flex flex-col overflow-hidden border border-slate-100 w-[380px] h-[600px] z-[1000] hidden">
    <div class="bg-blue-700 p-6 text-white flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-white/20 p-2 rounded-xl text-lg"><i class="fas fa-robot"></i></div>
            <div>
                <h4 class="font-bold text-sm leading-none">Smile AI Assistant</h4>
                <span class="text-[10px] text-blue-200 uppercase font-black tracking-widest italic">Live Finance Expert</span>
            </div>
        </div>
        <button onclick="toggleChat()" class="text-white/60 hover:text-white"><i class="fas fa-times"></i></button>
    </div>
    
    <div id="ai-messages" class="flex-1 p-6 space-y-4 overflow-y-auto bg-slate-50/50">
        <div class="bg-white p-4 rounded-2xl rounded-tl-none border border-slate-100 text-sm shadow-sm">
            Namaste! I am your Smart AI Assistant. I can generate images, analyze loan queries, and provide expert financial advice. How can I help?
        </div>
    </div>

    <div class="p-6 bg-white border-t border-slate-100">
        <div class="flex items-center gap-2 bg-slate-100 p-2 rounded-2xl border border-slate-200">
            <label class="cursor-pointer p-2 text-slate-400 hover:text-blue-600">
                <i class="fas fa-file-pdf"></i>
                <input type="file" class="hidden" id="pdf-upload" accept=".pdf,.doc,.docx">
            </label>
            
            <input type="text" id="ai-input" placeholder="Ask anything..." class="flex-1 bg-transparent p-2 border-none outline-none text-sm font-medium">
            
            <button id="mic-btn" class="p-2 text-slate-400 hover:text-red-600 transition">
                <i class="fas fa-microphone"></i>
            </button>

            <button id="send-ai" class="bg-blue-700 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-lg hover:scale-105 transition">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
        <p class="text-[8px] text-center text-slate-400 mt-3 font-bold uppercase tracking-widest">Powered by Groq & Gemini | Smile Financial Solution</p>
    </div>
</div>
